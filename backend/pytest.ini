[pytest]
# Pytest configuration for backend tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    ragas: RAGAS evaluation tests (slow)

# Async support
asyncio_mode = auto

# Coverage (when using --cov)
[coverage:run]
source = app
omit =
    app/__pycache__/*
    app/db/migrations/*
    */tests/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
