# Docker Compose for Multi-Agent Research Assistant
# Local development environment with hot-reload enabled
#
# Usage:
#   docker-compose up          # Start all services
#   docker-compose up -d       # Start in detached mode
#   docker-compose down        # Stop and remove containers
#   docker-compose logs -f     # Follow logs
#
# Prerequisites:
#   - Docker Desktop installed and running
#   - backend/.env file created (copy from backend/.env.example)
#   - Supabase project configured (cloud or local)

version: '3.8'

services:
  # FastAPI Backend - Agent orchestration, API endpoints
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: research-assistant-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Mount source code for hot-reload during development
      - ./backend/app:/app/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - research-net

  # Expo Frontend - React Native Web (for mobile dev, run `npm start` locally)
  frontend:
    image: node:20-slim
    container_name: research-assistant-frontend
    working_dir: /app
    ports:
      - "8081:8081"  # Expo Dev Server (web)
      - "19000:19000" # Expo Dev Tools (optional)
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules  # Named volume for node_modules
    command: bash -c "npm install && npx expo start --web --host 0.0.0.0"
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - EXPO_PUBLIC_API_URL=http://localhost:8000
    restart: unless-stopped
    networks:
      - research-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  research-net:
    driver: bridge

volumes:
  # Named volume for frontend node_modules (faster on Windows/Mac)
  frontend_node_modules:

# NOTES:
# - This configuration uses Supabase Cloud (configured in backend/.env)
# - For fully local Supabase: https://supabase.com/docs/guides/cli/local-development
# - Mobile development: Run `npm start` in frontend/ for iOS/Android (Docker is web-only)
# - Hot reload enabled for both backend (uvicorn --reload) and frontend (Expo)
# - Backend API: http://localhost:8000
# - Frontend Web: http://localhost:8081
# - API Docs: http://localhost:8000/docs
